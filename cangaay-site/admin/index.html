<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administration — Càngaay Li</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');
    CMS.registerPreviewStyle(`
      body { font-family: 'Crimson Pro', Georgia, serif; background: #FAF6F0; color: #1C1209; padding: 40px; max-width: 820px; margin: 0 auto; }
      h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 400; color: #5C1A3D; line-height: 1.1; margin-bottom: 16px; }
      h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; color: #7A2250; margin: 40px 0 14px; }
      h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 500; color: #A8336A; margin: 28px 0 10px; }
      p  { font-size: 1.1rem; line-height: 1.88; color: #3D2B1F; font-weight: 300; margin-bottom: 18px; }
      strong { font-weight: 600; color: #1C1209; }
      em { font-style: italic; color: #7A2250; }
      blockquote { border-left: 3px solid #C9A96E; padding: 16px 22px; background: #F2EAE0; margin: 28px 0; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: #7A2250; line-height: 1.6; }
      ul, ol { margin: 0 0 18px 24px; }
      li { font-size: 1.05rem; line-height: 1.8; color: #3D2B1F; font-weight: 300; margin-bottom: 5px; }
      img { max-width: 100%; border-radius: 4px; margin: 20px 0; }
    `, { raw: true });

    CMS.registerPreviewTemplate('articles', ({ entry }) => {
      const data = entry.getIn(['data']);
      const title = data.get('title') || 'Sans titre';
      const tag = data.get('tag') || '';
      const body = entry.getIn(['data', 'body']) || '';

      const el = document.createElement('div');
      el.style.cssText = 'padding:40px;background:#FAF6F0;min-height:100vh;';
      el.innerHTML = `
        <div style="background:#5C1A3D;padding:48px 40px 36px;margin:-40px -40px 40px;border-radius:0 0 0 0;">
          <p style="font-family:Crimson Pro,serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:#C9A96E;margin-bottom:14px;">${tag}</p>
          <h1 style="font-family:Cormorant Garamond,serif;font-size:2.4rem;font-weight:400;color:white;line-height:1.1;margin:0;">${title}</h1>
        </div>
        <div id="body-content"></div>
      `;
      return el;
    });
  </script>
</body>
</html>
